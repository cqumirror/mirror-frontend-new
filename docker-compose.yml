version: '3.9'

services:
  # ===== 前端服务（Nginx + React SPA）=====
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: mirror-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /data/mirrors:/data/mirrors:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./logs/nginx:/var/log/nginx
    environment:
      - TZ=Asia/Shanghai
    networks:
      - mirror-net
    # depends_on:
    #   - backend
    labels:
      - "com.mirror.service=frontend"

  # ===== 后端服务（tunasync manager）=====
  # 注意：CQU 的 tunasync manager 在宿主机上独立运行，不通过 Docker 管理
  # nginx 通过 host.docker.internal 或宿主机 IP 访问 tunasync manager
  # 如需通过 Docker 管理后端，取消注释以下配置：
  # backend:
  #   image: mirror-backend:latest
  #   container_name: mirror-backend
  #   restart: unless-stopped
  #   ports:
  #     - "127.0.0.1:8080:8080"
  #   volumes:
  #     - ./backend/config:/app/config:ro
  #     - /var/run/tunasync:/var/run/tunasync:ro
  #   environment:
  #     - NODE_ENV=production
  #     - PORT=8080
  #     - TZ=Asia/Shanghai
  #   networks:
  #     - mirror-net
  #   labels:
  #     - "com.mirror.service=backend"

  # ===== 监控栈 =====

  # node_exporter：采集宿主机 OS 指标（CPU/内存/磁盘/网络/系统负载）
  # 通过 pid/net/proc namespace 共享直接读取宿主机数据
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: mirror-node-exporter
    restart: unless-stopped
    pid: host
    network_mode: host          # 直接读取宿主机网络统计
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      - '--no-collector.arp'    # 禁用不需要的采集器
      - '--no-collector.ipvs'
    labels:
      - "com.mirror.service=node-exporter"

  # nginx-prometheus-exporter：从 nginx stub_status 采集连接/请求指标
  # 依赖 nginx default.conf 中开启的 /stub_status 端点
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.3
    container_name: mirror-nginx-exporter
    restart: unless-stopped
    command:
      - '--nginx.scrape-uri=http://frontend/stub_status'
    depends_on:
      - frontend
    networks:
      - mirror-net
    labels:
      - "com.mirror.service=nginx-exporter"

  # Prometheus：定时抓取所有 exporter，存储时间序列数据
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: mirror-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"   # 仅本机访问，不对外暴露
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'  # 保留 30 天数据
      - '--web.enable-lifecycle'             # 支持热重载 /-/reload
      - '--web.external-url=http://localhost:9090'
    networks:
      - mirror-net
    labels:
      - "com.mirror.service=prometheus"

  # Grafana：可视化面板 + 告警
  # 访问地址：http://your-server/grafana（由 nginx 反代）
  grafana:
    image: grafana/grafana:11.1.0
    container_name: mirror-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"   # 仅本机访问，通过 nginx /grafana 反代对外
    volumes:
      - grafana-data:/var/lib/grafana
      # 自动配置数据源（Prometheus）
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      # 自动配置仪表板目录
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      # 预置仪表板 JSON
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - TZ=Asia/Shanghai
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-cqu_mirror_admin}  # 请在 .env 中覆盖
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      # 允许 React 状态页通过 iframe 嵌入 Grafana 面板
      - GF_SECURITY_ALLOW_EMBEDDING=true
      # 匿名只读访问（让状态页可以嵌入面板而无需登录）
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      # 禁用匿名用户修改看板
      - GF_VIEWERS_CAN_EDIT=false
      # 禁用 Grafana 遥测
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
    depends_on:
      - prometheus
    networks:
      - mirror-net
    labels:
      - "com.mirror.service=grafana"

networks:
  mirror-net:
    driver: bridge
    name: mirror-network

volumes:
  prometheus-data:
    name: mirror-prometheus-data
  grafana-data:
    name: mirror-grafana-data

