# docker/default.conf
# Nginx 站点配置 - 包含 FancyIndex、直连后端 API 及校园网检测

server {
    listen 80;
    listen [::]:80;
    server_name mirrors.cqu.edu.cn;

    root /usr/share/nginx/html;
    index index.html;

    # ===== 安全响应头 =====
    # 注：基础安全头 (X-Content-Type-Options / X-Frame-Options / Referrer-Policy) 已在 http{} 中定义
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;

    # Content Security Policy
    # 收紧策略：
    #   - script-src 移除 'unsafe-inline'：JSON-LD 是 type="application/ld+json"（非可执行），不需要它
    #   - style-src 仍保留 'unsafe-inline'：MUI Emotion 注入内联样式必需，待迁移到 nonce 方案
    #   - connect-src 加 'self'：覆盖 axios 同源请求 + Grafana WebSocket（同源反代）
    #   - upgrade-insecure-requests：浏览器自动把 http 资源升级为 https
    set $csp "default-src 'self'; ";
    set $csp "${csp}script-src 'self'; ";
    set $csp "${csp}style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; ";
    set $csp "${csp}font-src 'self' https://fonts.gstatic.com data:; ";
    set $csp "${csp}img-src 'self' data: blob:; ";
    set $csp "${csp}connect-src 'self'; ";
    set $csp "${csp}frame-src 'self'; ";
    set $csp "${csp}frame-ancestors 'self'; ";
    set $csp "${csp}base-uri 'self'; ";
    set $csp "${csp}form-action 'self'; ";
    set $csp "${csp}object-src 'none'; ";
    set $csp "${csp}upgrade-insecure-requests;";
    add_header Content-Security-Policy $csp always;

    # HSTS：仅在 listen 443 时启用；HTTP 站点开 HSTS 无意义且会让用户首次访问失败
    # 切换到 HTTPS 后取消注释下一行（max-age 6 个月，方便回退）
    # add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;

    # ===== 校园网检测接口 =====
    # 用 nginx 内置变量直接判断：
    #   $remote_addr 为 IPv6 → 返回 "6"
    #   $remote_addr 为私网 IP → 返回 "1"
    #   其他 → 返回 "0"
    location = /api/is_campus_network {
        set $campus_result "0";
        if ($remote_addr ~* ":")                              { set $campus_result "6"; }
        if ($remote_addr ~* "^10\.")                          { set $campus_result "1"; }
        if ($remote_addr ~* "^172\.(1[6-9]|2[0-9]|3[01])\.") { set $campus_result "1"; }
        if ($remote_addr ~* "^192\.168\.")                    { set $campus_result "1"; }

        add_header Content-Type "text/plain; charset=utf-8";
        add_header Cache-Control "no-store";
        return 200 $campus_result;
    }

    # ===== 旧后端静态 JSON 接口 =====
    # 前端 fetchMirrors() 调用 GET /static/tunasync.json
    # nginx 转发至旧后端（tunasync 生成的静态 JSON 文件）
    # 注意：CQU 的 tunasync manager 在宿主机上运行，通过 host.docker.internal 访问
    location /static/ {
        set $backend_upstream http://host.docker.internal:12345;
        proxy_pass         $backend_upstream$request_uri;
        proxy_hide_header  X-Powered-By;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # ===== nginx stub_status（供 nginx-prometheus-exporter 抓取）=====
    location = /stub_status {
        stub_status on;
        allow 172.16.0.0/12;
        allow 10.0.0.0/8;
        allow 127.0.0.1;
        deny all;
        access_log off;
    }

    # ===== Grafana 反向代理 =====
    location /grafana/ {
        set $grafana_upstream http://grafana:3000;
        proxy_pass         $grafana_upstream/grafana/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
        # 清除父级 server{} 设置的 CSP，让 Grafana 自行管理
        add_header Content-Security-Policy "" always;
    }

    # ===== React SPA 路由 =====
    location / {
        try_files $uri $uri/ /index.html;

        # 静态资源长缓存：扩展到所有带 hash 的资源（含 svg/webp/avif/otf/eot）
        location ~* \.(?:js|css|woff2|woff|ttf|otf|eot|svg|webp|avif|png|jpg|jpeg|gif|ico|map)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            # 静态资源去除上游 CSP（Vite hash 文件不需要重复加 CSP 头）
            access_log off;
        }

        # HTML 永远不缓存，确保用户拿到最新入口
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # ===== Ubuntu 镜像 FancyIndex =====
    location /ubuntu/ {
        alias /data/mirrors/ubuntu/;
        fancyindex on;
        fancyindex_exact_size off;
        fancyindex_header /etc/nginx/conf.d/fancyindex/header.html;
        fancyindex_footer /etc/nginx/conf.d/fancyindex/footer.html;
        fancyindex_ignore "header.html" "footer.html" "\.tmp$";
        fancyindex_directories_first on;
        fancyindex_time_format "%Y-%m-%d %H:%M";
        fancyindex_name_length 256;
        fancyindex_css_href /fancyindex.css;
        fancyindex_show_path on;
    }

    location /debian/ {
        alias /data/mirrors/debian/;
        fancyindex on;
        fancyindex_exact_size off;
        fancyindex_header /etc/nginx/conf.d/fancyindex/header.html;
        fancyindex_footer /etc/nginx/conf.d/fancyindex/footer.html;
        fancyindex_ignore "header.html" "footer.html";
        fancyindex_directories_first on;
        fancyindex_time_format "%Y-%m-%d %H:%M";
        fancyindex_name_length 256;
        fancyindex_css_href /fancyindex.css;
    }

    # ===== 安全：禁止访问隐藏文件 =====
    location ~ /\. {
        deny all;
        return 404;
    }

    # 禁止访问备份/临时文件
    location ~ ~$ {
        deny all;
        return 404;
    }

    # ===== 错误页面（SPA 接管）=====
    # 注意：将所有错误码改为 200 会污染 nginx 状态码统计；保留原码让监控可见
    error_page 403 /index.html;
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}
