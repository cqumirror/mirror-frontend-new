<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── 基础 SEO ── -->
    <title>重庆大学开源软件镜像站 - CQU Mirror</title>
    <meta name="description" content="重庆大学开源软件镜像站致力于为国内和校内用户提供高质量的开源软件镜像、Linux 镜像源服务，帮助用户更方便地获取开源软件。本镜像站由重庆大学蓝盟负责维护。" />
    <meta name="keywords" content="重庆大学镜像站,CQU Mirror,开源软件镜像站,Linux镜像,高校镜像站,Ubuntu镜像,Debian镜像,Arch Linux镜像,CentOS镜像,Rocky Linux镜像,Alpine镜像,软件源,镜像源,重庆大学蓝盟,开源镜像" />
    <meta name="author" content="重庆大学" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://mirrors.cqu.edu.cn/" />

    <!-- ── Open Graph (Facebook / 微信 / QQ) ── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="CQU Mirror - 重庆大学开源软件镜像站" />
    <meta property="og:title" content="重庆大学开源软件镜像站 - CQU Mirror" />
    <meta property="og:description" content="重庆大学开源软件镜像站，为校内外用户提供高速开源软件镜像服务。由重庆大学蓝盟负责维护。" />
    <meta property="og:url" content="https://mirrors.cqu.edu.cn/" />
    <meta property="og:image" content="https://mirrors.cqu.edu.cn/favicon.svg" />
    <meta property="og:locale" content="zh_CN" />
    <meta property="og:locale:alternate" content="en_US" />

    <!-- ── Twitter Card ── -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="重庆大学开源软件镜像站 - CQU Mirror" />
    <meta name="twitter:description" content="重庆大学开源软件镜像站，为校内外用户提供高速开源软件镜像服务。" />
    <meta name="twitter:image" content="https://mirrors.cqu.edu.cn/favicon.svg" />

    <!-- ── 图标 ── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- ── 预加载字体 ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- ── JSON-LD 结构化数据（首页）── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "重庆大学开源软件镜像站",
      "alternateName": ["CQU Mirror", "CQU Open Source Mirror", "重庆大学镜像站"],
      "url": "https://mirrors.cqu.edu.cn",
      "description": "重庆大学开源软件镜像站致力于为国内和校内用户提供高质量的开源软件镜像、Linux 镜像源服务。",
      "publisher": {
        "@type": "Organization",
        "name": "重庆大学",
        "alternateName": "Chongqing University",
        "url": "https://www.cqu.edu.cn"
      },
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://mirrors.cqu.edu.cn/?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <!-- 供搜索引擎爬虫在 JS 未执行时也能看到核心内容 -->
    <noscript>
      <h1>重庆大学开源软件镜像站 - CQU Mirror</h1>
      <p>重庆大学开源软件镜像站致力于为国内和校内用户提供高质量的开源软件镜像服务。由重庆大学蓝盟负责维护。</p>
      <p>请启用 JavaScript 以获得完整体验。</p>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
